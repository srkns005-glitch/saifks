<style>
*{box-sizing:border-box}:root{--bg:#06101c;--panel:#0d1c2f;--panel2:#122640;--text:#f8fbff;--muted:#a9b7ca;--gold:#ffd46b;--line:rgba(255,255,255,.11)}
body{margin:0;color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;background:radial-gradient(circle at 80% 0,rgba(255,212,107,.12),transparent 28%),linear-gradient(180deg,#0a1727,var(--bg));min-height:100vh}

.search{width:100%;min-height:48px;border-radius:12px;border:1px solid #29415a;background:#08192b;color:#fff;padding:0 15px;font-size:16px}
.filters{display:flex;gap:8px;overflow:auto;padding-top:9px}.filter{white-space:nowrap;border:1px solid #29415a;background:#0b2136;color:#b9c8d8;padding:9px 13px;border-radius:999px;font-weight:850}.filter.active{background:var(--gold);color:#172033;border-color:var(--gold)}
.gen-head{display:flex;justify-content:space-between;align-items:end;margin:27px 0 15px}.gen-head h2{margin:0;font-size:1.8rem}.gen-head span{color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:17px;padding-bottom:70px}.card{overflow:hidden;border-radius:22px;border:1px solid var(--line);background:linear-gradient(145deg,#122640,#091727);box-shadow:0 16px 38px rgba(0,0,0,.25);transition:.2s}.card:hover{transform:translateY(-5px);border-color:rgba(255,212,107,.4)}
.card img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}.card-body{padding:16px}.card h3{margin:0 0 8px;font-size:1.45rem}.badges{display:flex;flex-wrap:wrap;gap:6px}.badge{font-size:.72rem;font-weight:900;color:#c2d1e0;background:#0a1d30;border:1px solid #294159;padding:5px 8px;border-radius:999px}.rating{margin:13px 0;color:var(--gold)}.open{width:100%;min-height:43px;border:0;border-radius:11px;background:linear-gradient(180deg,#ffd86b,#d89b2e);font-weight:950;color:#251805}

.modal.hidden{display:none}
.panel{width:min(780px,100%);height:100dvh;max-height:100dvh;display:flex;flex-direction:column;overflow:hidden;background:#0b1e32;border-inline:1px solid #304962;position:relative}
.modal-topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;background:rgba(7,19,32,.96);border-bottom:1px solid #294159;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.back-heroes{min-height:42px;border:1px solid #35516c;background:#10263b;color:#fff;border-radius:12px;padding:0 13px;font-weight:900;cursor:pointer}
.quick-close{flex:0 0 44px;width:44px;height:44px;border-radius:50%;border:1px solid #6a7d91;background:#8e3038;color:#fff;font-size:1.15rem;font-weight:900;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,.25)}
.quick-close:hover{background:#aa3943}
html[dir=rtl] .modal-topbar{direction:rtl}
.hero-banner{padding:24px;display:grid;grid-template-columns:150px 1fr;gap:20px;align-items:center;background:linear-gradient(135deg,#263c58,#8f6720)}.hero-banner img{width:150px;height:150px;object-fit:cover;border-radius:25px;border:2px solid rgba(255,255,255,.25)}.hero-banner h2{font-size:2.4rem;margin:0 0 8px}.hero-banner p{color:#e4edf6;margin:4px 0}
.sections{padding:15px}details{background:#0a1a2b;border:1px solid #284159;border-radius:15px;margin:10px 0;overflow:hidden}summary{cursor:pointer;padding:16px 17px;color:var(--gold);font-weight:950;list-style:none}summary::-webkit-details-marker{display:none}.content{padding:0 17px 17px;line-height:1.65;color:#d7e1eb}
.stats,.ratings,.gear-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.stat{background:#0d243a;border:1px solid #2d4a65;border-radius:12px;padding:11px}.stat small{display:block;color:#91a6bb}.skill{padding:13px 0;border-bottom:1px solid #294158}.skill:last-child{border-bottom:0}.skill h4{margin:0 0 5px;color:#fff}.levels{color:#8fb3d0;font-size:.86rem}ul{padding-inline-start:22px}.copy{width:100%;min-height:48px;border:0;border-radius:12px;background:#1d8a57;color:#fff;font-weight:950;margin-top:12px}
footer{text-align:center;color:#91a4b8;padding:22px}
@media(max-width:850px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.brand span{display:none}.home{padding:9px 11px}.lang{max-width:110px}.grid{grid-template-columns:1fr 1fr;gap:11px}.card-body{padding:12px}.card h3{font-size:1.15rem}.hero-banner{grid-template-columns:92px 1fr;padding:17px;gap:13px}.hero-banner img{width:92px;height:92px;border-radius:18px}.hero-banner h2{font-size:1.65rem}.stats,.ratings,.gear-stats{grid-template-columns:1fr 1fr}}

.footer{border-top:1px solid rgba(255,255,255,.10);background:#07111e;margin-top:20px}
.footer-inner{width:min(1120px,calc(100% - 28px));margin:auto;min-height:86px;display:flex;align-items:center;justify-content:space-between;gap:16px;color:#9fb0c3}
.footer strong{color:#fff}
.youtube{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 15px;border-radius:12px;background:#ff0033;color:#fff;text-decoration:none;font-weight:950;box-shadow:0 8px 20px rgba(255,0,51,.20)}
.copy{position:relative;z-index:1}
.copy.copy-success{background:#1f9a5f!important;box-shadow:0 10px 24px rgba(31,154,95,.30)}
@media(max-width:560px){.modal-topbar{padding:calc(8px + env(safe-area-inset-top)) 10px 8px}.back-heroes{max-width:72%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.modal-bottom-actions{padding-inline:10px}.hero-banner{padding-top:18px}}


/* ===== v2706 modal scroll fix ===== */
.modal{position:fixed;inset:0;z-index:9999;display:flex;justify-content:center;align-items:stretch;padding:0;background:rgba(1,7,13,.84)}
.modal.hidden{display:none}
.panel{width:min(780px,100%);height:100dvh;max-height:100dvh;min-height:0;display:flex;flex-direction:column;overflow:hidden;background:#0b1e32;border-inline:1px solid #304962}
.modal-topbar{position:relative;flex:0 0 auto;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:calc(9px + env(safe-area-inset-top)) 12px 9px;background:#071320;border-bottom:1px solid #294159}
.modal-scroll{position:relative;flex:1 1 0;min-height:0;height:0;overflow-y:auto!important;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;touch-action:pan-y;scroll-behavior:smooth}
.modal-bottom-actions{position:relative;flex:0 0 auto;z-index:20;display:grid;grid-template-columns:96px minmax(0,1fr);gap:10px;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:#071320;border-top:1px solid #294159}
.top-btn,.copy-fixed{min-height:48px;border-radius:13px;font-weight:950;cursor:pointer}
.top-btn{border:1px solid #425c74;background:#10263b;color:#fff}
.copy-fixed{border:1px solid #36a46c;background:#208f59;color:#fff;font-size:1rem}
.copy-fixed.copy-success{background:#1aaa68;border-color:#50d492;box-shadow:0 10px 24px rgba(31,154,95,.30)}
.copy-fixed:disabled{opacity:1;cursor:default}
body.modal-open{overflow:hidden;position:fixed;width:100%}
@supports not (height:100dvh){.panel{height:100vh;max-height:100vh}}


/* ===== Footer matching main website ===== */
.footer{margin-top:34px;background:#07111e;border-top:1px solid rgba(255,255,255,.10)}
.footer-inner{width:min(1120px,calc(100% - 28px));min-height:142px;margin:auto;display:flex;align-items:center;justify-content:center;gap:22px;border-top:1px solid rgba(255,255,255,.10);color:#9fb0c3;font-size:1.05rem}
.youtube-link{color:#fff;text-decoration:none;font-weight:950}
.footer-brand strong{color:#ffd46b}
.footer-sep{color:#74879b;margin:0 4px}

 .footer-inner{min-height:136px;gap:13px;font-size:.92rem;white-space:nowrap}
 .youtube-link{font-size:.95rem}
 .modal-bottom-actions{grid-template-columns:86px minmax(0,1fr);padding-inline:10px}
}


/* ===== Unified single-line footer ===== */
.footer{margin-top:34px;background:#07111e;border-top:1px solid rgba(255,255,255,.10)}
.footer-inner{
  width:min(1120px,calc(100% - 28px));

  margin:auto;

/* ===== Hero Center V2 Analysis Cards ===== */
.hero-summary-card{
  margin:14px 0;padding:18px;border-radius:18px;
  background:linear-gradient(135deg,rgba(255,212,107,.12),rgba(31,84,129,.16));
  border:1px solid rgba(255,212,107,.30)
}
.summary-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.summary-title{font-size:1.25rem;font-weight:950;color:#fff}
.status-badge{display:inline-flex;align-items:center;gap:7px;padding:8px 11px;border-radius:999px;background:#163953;border:1px solid #315d7d;color:#dff0ff;font-size:.82rem;font-weight:900}
.summary-meta{display:flex;flex-wrap:wrap;gap:8px;margin:13px 0}
.summary-meta span{padding:7px 10px;border-radius:999px;background:#0c2236;border:1px solid #2e4962;color:#c8d6e4;font-weight:850;font-size:.78rem}
.overall-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding-top:12px;border-top:1px solid rgba(255,255,255,.10)}
.overall-stars{color:#ffd46b;font-size:1.2rem;letter-spacing:2px}
.v2-two-col{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:12px}
.v2-card{background:#0d243a;border:1px solid #2e4962;border-radius:15px;padding:14px}
.v2-card h4{margin:0 0 9px;color:#ffd46b}
.tag-list{display:flex;flex-wrap:wrap;gap:7px}
.tag-list span{padding:7px 9px;border-radius:999px;background:#102a42;border:1px solid #35536c;color:#e6eef6;font-size:.78rem;font-weight:850}
.invest-grid,.mode-grid,.priority-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}
.analysis-metric{background:#0d243a;border:1px solid #2e4962;border-radius:13px;padding:11px}
.analysis-metric small{display:block;color:#93a9bd;margin-bottom:5px}
.analysis-stars{color:#ffd46b;letter-spacing:1px;font-weight:950}
.pros-cons{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.pros,.cons{border-radius:15px;padding:14px;border:1px solid}
.pros{background:rgba(24,117,75,.13);border-color:rgba(67,190,128,.33)}
.cons{background:rgba(145,48,58,.13);border-color:rgba(204,84,94,.34)}
.pros h4{color:#65dfa1}.cons h4{color:#ff8f98}
.verdict-box{background:linear-gradient(135deg,rgba(255,212,107,.15),rgba(130,82,18,.12));border:1px solid rgba(255,212,107,.36);border-radius:17px;padding:16px}
.verdict-box h4{margin:0 0 8px;color:#ffd46b;font-size:1.12rem}
.verdict-split{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:13px}
@media(max-width:560px){
 .v2-two-col,.pros-cons,.verdict-split{grid-template-columns:1fr}
 .invest-grid,.mode-grid,.priority-grid{grid-template-columns:1fr 1fr}
}


/* ===== Clear expandable-section guidance ===== */
.guide-notice{
  margin:14px 0 16px;
  padding:15px 16px;
  border-radius:16px;
  border:1px solid rgba(255,212,107,.45);
  background:
    radial-gradient(circle at 88% 18%,rgba(255,212,107,.15),transparent 28%),
    linear-gradient(135deg,rgba(27,74,111,.34),rgba(94,62,13,.24));
  box-shadow:0 10px 24px rgba(0,0,0,.16);
  text-align:center;
}
.guide-notice strong{
  display:block;
  color:#ffd46b;
  font-size:1.08rem;
  margin-bottom:5px;
}
.guide-notice span{
  color:#e7eef6;
  font-size:.9rem;
  line-height:1.45;
}
details>summary{
  position:relative;
  display:flex;
  align-items:center;
  gap:10px;
  padding-inline-end:56px!important;
  min-height:54px;
  background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.008));
  transition:background .18s ease,border-color .18s ease;
}
details>summary:hover{background:rgba(255,212,107,.055)}
details>summary::after{
  content:"＋";
  position:absolute;
  inset-inline-end:15px;
  top:50%;
  transform:translateY(-50%);
  width:30px;
  height:30px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:#173149;
  border:1px solid #3d607d;
  color:#ffd46b;
  font-size:1.18rem;
  font-weight:950;
  transition:transform .2s ease,background .2s ease;
}
details[open]>summary::after{
  content:"−";
  background:#9b7128;
  color:#fff;
}
details>summary::before{
  content:"▶";
  flex:0 0 auto;
  color:#ffd46b;
  font-size:.82rem;
  transition:transform .2s ease;
}
details[open]>summary::before{transform:rotate(90deg)}
.section-count{
  margin-inline-start:auto;
  margin-inline-end:4px;
  color:#91a8bc;
  font-size:.72rem;
  font-weight:850;
  white-space:nowrap;
}
@media(max-width:560px){
  .guide-notice{padding:14px 12px}
  .guide-notice strong{font-size:1rem}
  details>summary{padding-inline-end:50px!important;font-size:.96rem}
  .section-count{font-size:.66rem}
}

</style>

function applyLang(){
 document.documentElement.lang=lang;document.documentElement.dir=lang==="ar"?"rtl":"ltr";

function render(){

 const list=heroes.filter(h=>(activeClass==="All"||h.class===activeClass)&&h.name.toLowerCase().includes(s));
 q("#heroCount").textContent=list.length+" "+u("heroes");q("#empty").hidden=!!list.length;

}
function statGrid(obj){return `<div class="stats">${Object.entries(obj).map(([k,v])=>`<div class="stat"><small>${k}</small><b>${v}</b></div>`).join("")}</div>`}
function skillList(arr){return arr.map(s=>`<div class="skill"><h4>${s.name}</h4><div>${s[lang]||s.en}</div><div class="levels">${u("upgrade")}: ${s.levels}</div></div>`).join("")}

async function copyTextSafe(value){
  if(navigator.clipboard && window.isSecureContext){
    try{
      await navigator.clipboard.writeText(value);
      return true;
    }catch(e){}
  }
  const area=document.createElement("textarea");
  area.value=value;
  area.setAttribute("readonly","");
  area.style.position="fixed";
  area.style.top="-1000px";
  area.style.opacity="0";
  document.body.appendChild(area);
  area.focus();
  area.select();
  area.setSelectionRange(0,area.value.length);
  let ok=false;
  try{ok=document.execCommand("copy")}catch(e){ok=false}
  area.remove();
  return ok;
}


function localizedList(obj){return obj?.[lang]||obj?.en||[]}
function metricGrid(obj,cls="analysis-metric"){
  return Object.entries(obj).map(([k,v])=>`<div class="${cls}"><small>${k}</small><div class="analysis-stars">${stars(v)}</div></div>`).join("");
}
function renderHeroSummary(h){
  const overall=Math.round((h.ratings.Rally+h.ratings.Defense+h.ratings.Arena+h.ratings.Bear)/4);
  return `<div class="hero-summary-card">
    <div class="summary-top">
      <div class="summary-title">${u("summary")}</div>
      <div class="status-badge">● ${(h.status?.[lang]||h.status?.en||"")}</div>
    </div>
    <div class="summary-meta">
      <span>${u("generation")} ${h.generation}</span>
      <span>${classLabel(h.class)}</span>
      <span>${u("mythic")}</span>
    </div>
    <div class="overall-row"><b>${u("overall")}</b><span class="overall-stars">${stars(overall)}</span></div>
    <div class="v2-two-col">
      <div class="v2-card"><h4>🏆 ${u("bestFor")}</h4><div class="tag-list">${localizedList(h.bestFor).map(x=>`<span>${x}</span>`).join("")}</div></div>

    </div>
  </div>`;
}
function renderV2Sections(h){
  return `

    <div class="cons"><h4>❌ ${u("weaknesses")}</h4><ul>${localizedList(h.weaknesses).map(x=>`<li>${x}</li>`).join("")}</ul></div>
  </div></div></details>

  <details open><summary>👑 ${u("verdict")}</summary><div class="content"><div class="verdict-box">

function guideNotice(){
  return `<div class="guide-notice">
    <strong>👇 ${u("guideNoticeTitle")} 👇</strong>
    <span>${u("guideNoticeText")}</span>
  </div>`;
}
function decorateExpandableSections(){
  q("#sections").querySelectorAll("details").forEach(detail=>{
    const summary=detail.querySelector(":scope > summary");
    const content=detail.querySelector(":scope > .content");
    if(!summary||!content||summary.querySelector(".section-count"))return;
    let count=content.querySelectorAll("li,.skill,.stat,.analysis-metric,.v2-card").length;
    if(!count){
      const meaningful=[...content.children].filter(el=>el.textContent.trim()).length;
      count=Math.max(meaningful,1);
    }
    const badge=document.createElement("span");
    badge.className="section-count";
    badge.textContent=`${count} ${u("items")}`;
    summary.appendChild(badge);
  });
}

function openHero(id){
 const h=heroes.find(x=>x.id===id);current=h;q("#modalImage").src=h.image;q("#modalName").textContent=h.name;
 q("#modalMeta").textContent=`${u("generation")} ${h.generation} · ${classLabel(h.class)}`;
 q("#modalStars").textContent=stars(Math.round((h.ratings.Rally+h.ratings.Defense+h.ratings.Arena+h.ratings.Bear)/4));
 let html=renderHeroSummary(h)+guideNotice()+`<details open><summary>${u("overview")}</summary><div class="content">${text(h,"overview")}</div></details>`;
 html+=`<details><summary>${u("sources")}</summary><div class="content"><ul>${h.source.map(x=>`<li>${x}</li>`).join("")}</ul></div></details>`;
 if(h.talent)html+=`<details><summary>${u("talent")} — ${h.talent.name}</summary><div class="content">${h.talent[lang]||h.talent.en}<div class="levels">${u("upgrade")}: ${h.talent.levels}</div></div></details>`;
 html+=`<details open><summary>${u("conquest")}</summary><div class="content">${statGrid(h.conquestStats)}${skillList(h.conquest)}</div></details>`;
 html+=`<details open><summary>${u("expedition")}</summary><div class="content">${statGrid(h.expeditionStats)}${skillList(h.expedition)}</div></details>`;
 const g=h.gear;html+=`<details><summary>${u("gear")} — ${g.name}</summary><div class="content"><div class="gear-stats">${Object.entries(g.stats).map(([k,v])=>`<div class="stat"><small>${k}</small><b>${v}</b></div>`).join("")}</div><div class="skill"><h4>${g.conquestSkill.name}</h4><div>${g.conquestSkill[lang]||g.conquestSkill.en}</div><div class="levels">${g.conquestSkill.levels}</div></div><div class="skill"><h4>${g.expeditionSkill.name}</h4><div>${g.expeditionSkill[lang]||g.expeditionSkill.en}</div><div class="levels">${g.expeditionSkill.levels}</div></div></div></details>`;
 html+=`<details><summary>${u("ratings")}</summary><div class="content"><div class="ratings">${Object.entries(h.ratings).map(([k,v])=>`<div class="stat"><small>${k}</small><b class="rating">${stars(v)}</b></div>`).join("")}</div></div></details>`;
 html+=renderV2Sections(h);html+=`<details><summary>📝 ${u("analysis")}</summary><div class="content">${text(h,"analysis")}</div></details>`;
 q("#sections").innerHTML=html;decorateExpandableSections();
 pageScrollY=window.scrollY||document.documentElement.scrollTop||0;
 q("#modal").classList.remove("hidden");
 q("#modalScroll").scrollTop=0;
 document.body.classList.add("modal-open");
 document.body.style.top=`-${pageScrollY}px`;
 
}

q("#copyBtn").onclick=async()=>{

  const content=`${current.name}\n${text(current,"analysis")}\n\nSource: SaifKS.com\nBuilt by Saif`;
  const b=q("#copyBtn");
  const label=q("#copyBtnText");
