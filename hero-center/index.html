<style>
*{box-sizing:border-box}:root{--bg:#06101c;--panel:#0d1c2f;--panel2:#122640;--text:#f8fbff;--muted:#a9b7ca;--gold:#ffd46b;--line:rgba(255,255,255,.11)}
body{margin:0;color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;background:radial-gradient(circle at 80% 0,rgba(255,212,107,.12),transparent 28%),linear-gradient(180deg,#0a1727,var(--bg));min-height:100vh}

.brand{display:flex;align-items:center;gap:11px}.brand img{width:50px;height:50px;border-radius:15px}.brand b{font-size:1.12rem}.brand span{display:block;color:var(--gold);font-size:.74rem;margin-top:4px}

.controls{position:sticky;top:7px;z-index:8;padding:9px;background:rgba(7,20,35,.86);backdrop-filter:blur(15px);border:1px solid var(--line);border-radius:17px;margin-bottom:22px}
.search{width:100%;min-height:48px;border-radius:12px;border:1px solid #29415a;background:#08192b;color:#fff;padding:0 15px;font-size:16px}

.quick-close:hover{background:#aa3943}
html[dir=rtl] .modal-topbar{direction:rtl}

.footer{border-top:1px solid rgba(255,255,255,.10);background:#07111e;margin-top:20px}
.footer-inner{width:min(1120px,calc(100% - 28px));margin:auto;min-height:86px;display:flex;align-items:center;justify-content:space-between;gap:16px;color:#9fb0c3}

const supported=Object.keys(UI);
const BACK_LABELS={en:"Heroes",ar:"الأبطال",fr:"Héros",de:"Helden",es:"Héroes",tr:"Kahramanlar",ko:"영웅",ja:"英雄",zh:"英雄"};

const params=new URLSearchParams(location.search);
let lang=params.get("lang")||localStorage.getItem("saifRallyLang")||"en";
if(!supported.includes(lang))lang="en";
let activeClass="All",current=null;
const q=s=>document.querySelector(s);
const text=(h,key)=>(h[key]&&h[key][lang])||h[key]?.en||"";
const u=k=>UI[lang][k]||UI.en[k]||k;
const stars=n=>"★".repeat(n)+"☆".repeat(5-n);
function classLabel(c){return u(c.toLowerCase())||c}
function applyLang(){
 document.documentElement.lang=lang;document.documentElement.dir=lang==="ar"?"rtl":"ltr";
 q("#langSelect").value=lang;q("#title").textContent=u("heroCenter");q("#subtitle").textContent=u("subtitle");
 q("#homeBtn").textContent="⌂ "+u("home");q("#search").placeholder=u("search");q("#genTitle").textContent=u("generation")+" 1";q("#backHeroesText").textContent=BACK_LABELS[lang]||BACK_LABELS.en;
 q("#empty").textContent=u("noResults");localStorage.setItem("saifRallyLang",lang);renderFilters();render();
}
function renderFilters(){
 const opts=["All","Infantry","Cavalry","Archer"];
 q("#filters").innerHTML=opts.map(c=>`<button class="filter ${activeClass===c?"active":""}" data-class="${c}">${c==="All"?u("all"):classLabel(c)}</button>`).join("");
}
function render(){
 const s=q("#search").value.trim().toLowerCase();
 const list=heroes.filter(h=>(activeClass==="All"||h.class===activeClass)&&h.name.toLowerCase().includes(s));
 q("#heroCount").textContent=list.length+" "+u("heroes");q("#empty").hidden=!!list.length;
 q("#grid").innerHTML=list.map(h=>`<article class="card"><img src="${h.image}" alt="${h.name}"><div class="card-body"><h3>${h.name}</h3><div class="badges"><span class="badge">${classLabel(h.class)}</span><span class="badge">${u("generation")} ${h.generation}</span></div><div class="rating">${stars(Math.round((h.ratings.Rally+h.ratings.Defense+h.ratings.Arena+h.ratings.Bear)/4))}</div><button class="open" data-id="${h.id}">${u("open")} →</button></div></article>`).join("");
}
function statGrid(obj){return `<div class="stats">${Object.entries(obj).map(([k,v])=>`<div class="stat"><small>${k}</small><b>${v}</b></div>`).join("")}</div>`}
function skillList(arr){return arr.map(s=>`<div class="skill"><h4>${s.name}</h4><div>${s[lang]||s.en}</div><div class="levels">${u("upgrade")}: ${s.levels}</div></div>`).join("")}

async function copyTextSafe(value){
  if(navigator.clipboard && window.isSecureContext){
    try{
      await navigator.clipboard.writeText(value);
      return true;
    }catch(e){}
  }
  const area=document.createElement("textarea");
  area.value=value;
  area.setAttribute("readonly","");
  area.style.position="fixed";
  area.style.top="-1000px";
  area.style.opacity="0";
  document.body.appendChild(area);
  area.focus();
  area.select();
  area.setSelectionRange(0,area.value.length);
  let ok=false;
  try{ok=document.execCommand("copy")}catch(e){ok=false}
  area.remove();
  return ok;
}

function openHero(id){
 const h=heroes.find(x=>x.id===id);current=h;q("#modalImage").src=h.image;q("#modalName").textContent=h.name;
 q("#modalMeta").textContent=`${u("generation")} ${h.generation} · ${classLabel(h.class)}`;
 q("#modalStars").textContent=stars(Math.round((h.ratings.Rally+h.ratings.Defense+h.ratings.Arena+h.ratings.Bear)/4));
 let html=`<details open><summary>${u("overview")}</summary><div class="content">${text(h,"overview")}</div></details>`;
 html+=`<details><summary>${u("sources")}</summary><div class="content"><ul>${h.source.map(x=>`<li>${x}</li>`).join("")}</ul></div></details>`;
 if(h.talent)html+=`<details><summary>${u("talent")} — ${h.talent.name}</summary><div class="content">${h.talent[lang]||h.talent.en}<div class="levels">${u("upgrade")}: ${h.talent.levels}</div></div></details>`;
 html+=`<details open><summary>${u("conquest")}</summary><div class="content">${statGrid(h.conquestStats)}${skillList(h.conquest)}</div></details>`;
 html+=`<details open><summary>${u("expedition")}</summary><div class="content">${statGrid(h.expeditionStats)}${skillList(h.expedition)}</div></details>`;
 const g=h.gear;html+=`<details><summary>${u("gear")} — ${g.name}</summary><div class="content"><div class="gear-stats">${Object.entries(g.stats).map(([k,v])=>`<div class="stat"><small>${k}</small><b>${v}</b></div>`).join("")}</div><div class="skill"><h4>${g.conquestSkill.name}</h4><div>${g.conquestSkill[lang]||g.conquestSkill.en}</div><div class="levels">${g.conquestSkill.levels}</div></div><div class="skill"><h4>${g.expeditionSkill.name}</h4><div>${g.expeditionSkill[lang]||g.expeditionSkill.en}</div><div class="levels">${g.expeditionSkill.levels}</div></div></div></details>`;
 html+=`<details><summary>${u("ratings")}</summary><div class="content"><div class="ratings">${Object.entries(h.ratings).map(([k,v])=>`<div class="stat"><small>${k}</small><b class="rating">${stars(v)}</b></div>`).join("")}</div></div></details>`;
 html+=`<details open><summary>👑 ${u("analysis")}</summary><div class="content">${text(h,"analysis")}<button class="copy" id="copyBtn">${u("copy")}</button></div></details>`;
 q("#sections").innerHTML=html;q("#modal").classList.remove("hidden");document.body.style.overflow="hidden";
 q("#copyBtn").onclick=async()=>{
   const content=`${h.name}\n${text(h,"analysis")}\n\nSource: SaifKS.com\nBuilt by Saif`;
   const b=q("#copyBtn");
   const old=b.textContent;
   const ok=await copyTextSafe(content);
   if(ok){
     b.textContent="✅ "+u("copied");
     b.classList.add("copy-success");
     b.disabled=true;
     setTimeout(()=>{b.textContent=old;b.classList.remove("copy-success");b.disabled=false},1400);
   }
 };
}
function closeHero(){q("#modal").classList.add("hidden");document.body.style.overflow=""}
q("#filters").onclick=e=>{const b=e.target.closest("[data-class]");if(b){activeClass=b.dataset.class;renderFilters();render()}};
q("#grid").onclick=e=>{const b=e.target.closest("[data-id]");if(b)openHero(b.dataset.id)};
q("#search").oninput=render;q("#closeTop").onclick=closeHero;q("#backHeroesBtn").onclick=closeHero;q("#modal").onclick=e=>{if(e.target.id==="modal")closeHero()};
q("#langSelect").onchange=e=>{lang=e.target.value;applyLang()};
window.addEventListener("storage",e=>{if(e.key==="saifRallyLang"&&supported.includes(e.newValue)){lang=e.newValue;applyLang()}});
applyLang();
</script>
