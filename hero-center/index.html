const LANGS=["en","ar","fr","de","es","tr","ko","ja","zh"];
let lang=LANGS.includes(localStorage.getItem("saifks-lang"))?localStorage.getItem("saifks-lang"):"en",rarity="Mythic",sub="All",query="",current=null;
const $=s=>document.querySelector(s), tr=k=>T[lang][k]||k;
function clsLabel(c){return tr(c.toLowerCase())||c}
function applyLanguage(){
 document.documentElement.lang=lang;document.documentElement.dir=lang==="ar"?"rtl":"ltr";
 $("#brandSub").textContent=tr("brandSub");$("#homeBtn").title=tr("home");$("#homeBtn").setAttribute("aria-label",tr("home"));$("#langSelect").value=lang;
 $("#title").textContent=tr("title");$("#subtitle").textContent=tr("subtitle");$("#search").placeholder=tr("search");
 $("#backBtn").textContent=tr("back");$("#noticeTitle").textContent=tr("noticeTitle");$("#noticeText").textContent=tr("noticeText");$("#topBtn").textContent=tr("top");$("#copyBtn").textContent=tr("copy");
 renderTabs();render();
}
function renderTabs(){
 const rt=[["Mythic",tr("mythic")],["Epic",tr("epic")],["Rare",tr("rare")]];
 $("#rarityTabs").innerHTML=rt.map(([v,l])=>`<button class="tab ${rarity===v?"active":""}" data-v="${v}">${l} (${heroes.filter(h=>h.rarity===v).length})</button>`).join("");
 $("#rarityTabs").querySelectorAll("button").forEach(b=>b.onclick=()=>{rarity=b.dataset.v;sub="All";renderTabs();render()});
 let subs;
 if(rarity==="Mythic") subs=[["All",tr("all")],...Array.from(new Set(heroes.filter(h=>h.rarity==="Mythic").map(h=>h.generation))).sort((a,b)=>a-b).map(g=>[String(g),`${tr("generation")} ${g}`])];
 else subs=[["All",tr("all")],["Infantry",tr("infantry")],["Archer",tr("archer")],["Cavalry",tr("cavalry")]];
 $("#subTabs").innerHTML=subs.map(([v,l])=>`<button class="subtab ${sub===v?"active":""}" data-v="${v}">${l}</button>`).join("");
 $("#subTabs").querySelectorAll("button").forEach(b=>b.onclick=()=>{sub=b.dataset.v;renderTabs();render()});
}
function filtered(){
 return heroes.filter(h=>h.rarity===rarity)
 .filter(h=>sub==="All"||(rarity==="Mythic"?String(h.generation)===sub:h.class===sub))
 .filter(h=>(h.name+" "+h.class+" "+(h.generation||"")+" "+h.sources.join(" ")).toLowerCase().includes(query.toLowerCase()));
}
function render(){
 const list=filtered();
 $("#sectionTitle").textContent=rarity==="Mythic"?(sub==="All"?tr("mythic"):`${tr("generation")} ${sub}`):(sub==="All"?tr(rarity.toLowerCase()):clsLabel(sub));
 $("#count").textContent=`${list.length} ${tr("heroes")}`;
 $("#grid").innerHTML=list.length?list.map(h=>`<article class="card" data-rarity="${h.rarity}">
 <span class="badge rarity">${lang==="ar"?(h.rarity==="Mythic"?tr("mythic"):h.rarity):h.rarity}</span>
 <img src="${h.image}" alt="${h.name}" loading="lazy"><div class="cardbody"><h3>${h.name}</h3><div class="badges">
 <span class="badge class-badge">⚔ ${clsLabel(h.class)}</span>${h.generation?`<span class="badge">${tr("generation")} ${h.generation}</span>`:""}</div>
 <button class="open" data-id="${h.id}">${tr("view")}</button></div></article>`).join(""):`<div class="empty">${tr("none")}</div>`;
 $("#grid").querySelectorAll(".open").forEach(b=>b.onclick=()=>openHero(b.dataset.id));
}
function listHTML(lines){
 if(!lines||!lines.length)return `<p>—</p>`;
 return `<ul class="lines">${lines.map(x=>`<li>${x}</li>`).join("")}</ul>`;
}
function details(title,body,open=false){return `<details ${open?"open":""}><summary>${title}</summary><div class="content">${body}</div></details>`}
function openHero(id){
 current=heroes.find(h=>h.id===id);if(!current)return;
 $("#mImg").src=current.image;$("#mName").textContent=current.name;
 $("#mMeta").textContent=`${current.generation?`${tr("generation")} ${current.generation} · `:""}${tr("class")}: ${clsLabel(current.class)} · ${lang==="ar"&&current.rarity==="Mythic"?tr("mythic"):current.rarity}`;
 $("#mStars").textContent=current.rarity==="Mythic"?"★★★★★":current.rarity==="Epic"?"★★★★":"★★★";
 let stats=Object.entries(current.stats||{}).map(([k,v])=>`<div class="stat"><small>${k}</small><b>${v}</b></div>`).join("");
 let src=current.sources?.length?`<div class="sourcechips">${current.sources.map(x=>`<span>${x}</span>`).join("")}</div>`:"<p>—</p>";
 $("#sections").innerHTML=
 details("📘 "+tr("overview"),`<p>${current.overview}</p>`,true)+
 details("📍 "+tr("sources"),src,true)+
 details("📊 "+tr("stats"),`<div class="stats">${stats||"—"}</div>`,true)+
 details("⚔️ "+tr("conquest"),listHTML(current.conquest))+
 details("🛡️ "+tr("expedition"),listHTML(current.expedition))+
 (current.rarity==="Mythic"?details("✨ "+tr("gear"),listHTML(current.gear)):"");
 $("#modal").classList.remove("hidden");document.body.style.overflow="hidden";$("#scroll").scrollTop=0;
}
function closeModal(){$("#modal").classList.add("hidden");document.body.style.overflow="";}
$("#closeBtn").onclick=closeModal;$("#backBtn").onclick=closeModal;$("#topBtn").onclick=()=>$("#scroll").scrollTo({top:0,behavior:"smooth"});
$("#modal").onclick=e=>{if(e.target===$("#modal"))closeModal()};
$("#langSelect").onchange=e=>{lang=e.target.value;localStorage.setItem("saifks-lang",lang);applyLanguage()};
$("#search").oninput=e=>{query=e.target.value;render()};
$("#copyBtn").onclick=async()=>{
 if(!current)return;
 const text=`${current.name}\n${current.rarity}${current.generation?` · Generation ${current.generation}`:""} · ${current.class}\nSources: ${current.sources.join(", ")}\nSaifKS.com`;
 try{await navigator.clipboard.writeText(text)}catch{const t=document.createElement("textarea");t.value=text;document.body.appendChild(t);t.select();document.execCommand("copy");t.remove()}
 const b=$("#copyBtn"),old=b.textContent;b.textContent=tr("copied");setTimeout(()=>b.textContent=tr("copy"),1400);
};
applyLanguage();
</script>
