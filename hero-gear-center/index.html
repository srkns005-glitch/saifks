const supported=Object.keys(I18N);
const queryLang=new URLSearchParams(location.search).get("lang");
let lang=supported.includes(queryLang)?queryLang:(supported.includes(localStorage.getItem("saifRallyLang"))?localStorage.getItem("saifRallyLang"):"en");
let tool="enhancement";
const state={enhancement:{current:0,target:20,max:200},mastery:{current:0,target:10,max:20},widgets:{current:0,target:5,max:10}};
const $=s=>document.querySelector(s), t=k=>I18N[lang][k]||I18N.en[k]||k, fmt=n=>new Intl.NumberFormat(lang).format(n);
function applyLanguage(){
 document.documentElement.lang=lang;document.documentElement.dir=lang==="ar"?"rtl":"ltr";
 document.querySelectorAll("[data-i18n]").forEach(el=>el.textContent=t(el.dataset.i18n));
 $("#languageSelect").value=lang;$("#homeLink").textContent=t("home");$("#homeLink").href="../index.html?lang="+encodeURIComponent(lang);
 document.querySelectorAll("[data-gear-label]").forEach(el=>el.textContent=t(el.dataset.gearLabel));
 localStorage.setItem("saifRallyLang",lang);render();
}
function setupRanges(){
 const s=state[tool];$("#currentRange").min=0;$("#currentRange").max=s.max-1;$("#targetRange").min=1;$("#targetRange").max=s.max;
 $("#currentRange").value=s.current;$("#targetRange").value=s.target;
}
function enhancementResult(c,target){
 let xp=0,mithril=0,mythic=0;
 for(let level=c+1;level<=target;level++){
   const row=GEAR_DATA[level]||{xp:0,mithril:0,mythic:0};
   xp+=row.xp;mithril+=row.mithril;mythic+=row.mythic;
 }
 return {xp,mithril,mythic};
}
function masteryResult(c,target){
 let hammers=0,mythic=0;
 for(let level=c+1;level<=target;level++){hammers+=level*10;if(level>10)mythic+=level-10}
 return {hammers,mythic,bonus:target*10,multiplier:(1+target*.1).toFixed(1)};
}
function widgetResult(c,target){
 let widgets=0;for(let level=c+1;level<=target;level++)widgets+=level*5;
 return {widgets};
}
function metric(label,value,wide=false){return `<div class="metric ${wide?"wide":""}"><small>${label}</small><b>${value}</b></div>`}
function render(){
 setupRanges();const s=state[tool];
 $("#currentValue").textContent=s.current;$("#targetValue").textContent=s.target;
 $("#workspaceTitle").textContent=tool==="enhancement"?t("upgrade"):tool==="mastery"?t("mastery"):t("widgets");
 $("#statusText").textContent=tool==="enhancement"?t("enhancementReady"):tool==="mastery"?t("masteryReady"):t("widgetsReady");
 $("#resultStatus").textContent=$("#statusText").textContent;
 $("#verifiedText").textContent=tool==="enhancement"?t("verified"):"";
 $("#pathLabel").textContent=t("path");$("#pathNumbers").textContent=`${s.current} → ${s.target}`;
 const pct=Math.max(0,Math.min(100,(s.target/s.max)*100));$("#progressFill").style.width=pct+"%";
 const marks=tool==="enhancement"?[0,40,80,100,120,140,160,180,200]:tool==="mastery"?[0,5,10,15,20]:[0,2,4,6,8,10];
 $("#milestones").innerHTML=marks.map(x=>`<span>${x}</span>`).join("");
 if(s.target<=s.current){
  $("#metrics").innerHTML="";$("#summaryContent").innerHTML=`<p class="warning">${t("invalid")}</p>`;return;
 }
 let r,metrics="",summary="";
 if(tool==="enhancement"){
  r=enhancementResult(s.current,s.target);
  metrics=metric(t("xp"),fmt(r.xp),true)+metric(t("mithril"),fmt(r.mithril))+metric(t("mythic"),fmt(r.mythic));
  summary=`<p><b>${s.current} → ${s.target}</b></p><p>${t("xp")}: ${fmt(r.xp)}</p><p>${t("mithril")}: ${fmt(r.mithril)}</p><p>${t("mythic")}: ${fmt(r.mythic)}</p>`;
 }else if(tool==="mastery"){
  r=masteryResult(s.current,s.target);
  metrics=metric(t("hammers"),fmt(r.hammers),true)+metric(t("mythic"),fmt(r.mythic))+metric(t("bonus"),`+${r.bonus}%`)+metric(t("multiplier"),`×${r.multiplier}`,true);
  summary=`<p><b>${s.current} → ${s.target}</b></p><p>${t("hammers")}: ${fmt(r.hammers)}</p><p>${t("mythic")}: ${fmt(r.mythic)}</p>`;
 }else{
  r=widgetResult(s.current,s.target);
  metrics=metric(t("widgetsNeeded"),fmt(r.widgets),true);
  summary=`<p><b>${s.current} → ${s.target}</b></p><p>${t("widgetsNeeded")}: ${fmt(r.widgets)}</p>`;
 }
 $("#metrics").innerHTML=metrics;$("#summaryContent").innerHTML=summary;
}
document.querySelectorAll(".tool-card").forEach(card=>card.onclick=()=>{tool=card.dataset.tool;document.querySelectorAll(".tool-card").forEach(x=>x.classList.toggle("active",x===card));render();document.querySelector(".workspace").scrollIntoView({behavior:"smooth",block:"start"})});
document.querySelectorAll("[data-action]").forEach(btn=>btn.onclick=()=>{
 const s=state[tool],a=btn.dataset.action;
 if(a==="minus-current")s.current=Math.max(0,s.current-1);
 if(a==="plus-current")s.current=Math.min(s.max-1,s.current+1);
 if(a==="minus-target")s.target=Math.max(1,s.target-1);
 if(a==="plus-target")s.target=Math.min(s.max,s.target+1);
 if(s.target<=s.current)s.target=Math.min(s.max,s.current+1);render();
});
$("#currentRange").oninput=e=>{const s=state[tool];s.current=+e.target.value;if(s.target<=s.current)s.target=Math.min(s.max,s.current+1);render()};
$("#targetRange").oninput=e=>{const s=state[tool];s.target=+e.target.value;if(s.target<=s.current)s.current=Math.max(0,s.target-1);render()};
$("#resetBtn").onclick=()=>{state[tool].current=0;state[tool].target=tool==="enhancement"?20:tool==="mastery"?10:5;render()};
$("#copyBtn").onclick=async()=>{const text=`${$("#workspaceTitle").textContent}\n${$("#pathNumbers").textContent}\n${$("#summaryContent").innerText}\nSaifKS.com`;try{await navigator.clipboard.writeText(text)}catch{const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove()}const old=$("#copyBtn").textContent;$("#copyBtn").textContent=t("copied");setTimeout(()=>$("#copyBtn").textContent=t("copy"),1400)};
document.querySelectorAll("[data-preset]").forEach(btn=>btn.onclick=()=>{
 if(tool!=="enhancement")return;
 state.enhancement.target=+btn.dataset.preset;
 if(state.enhancement.current>=state.enhancement.target)state.enhancement.current=Math.max(0,state.enhancement.target-1);
 render();
});
$("#languageSelect").onchange=e=>{lang=e.target.value;applyLanguage()};
window.addEventListener("storage",e=>{if(e.key==="saifRallyLang"&&supported.includes(e.newValue)){lang=e.newValue;applyLanguage()}});
applyLanguage();
</script>
