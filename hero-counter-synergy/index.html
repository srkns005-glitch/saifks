<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>SaifKS Hero Comparison</title><link rel="stylesheet" href="styles.css"></head><body>
