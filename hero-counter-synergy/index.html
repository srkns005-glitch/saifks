<!doctype html><html lang="en" dir="ltr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#07111d"><title>Hero Counter + Synergy | SaifKS</title><link rel="stylesheet" href="styles.css"></head><body>
<header><div class="brand"><img src="../logo.png" alt="SaifKS" onerror="this.outerHTML='<span class=&quot;brandFallback&quot;>S</span>'"><div><b>SaifKS</b><small data-t="heroIntelligence">Hero Intelligence</small></div></div><div class="actions"><button id="lang">العربية</button><button id="reset" data-t="reset">Reset</button></div></header>
<main>
<section class="intro"><span data-t="engine">KINGSHOT ANALYSIS ENGINE</span><h1 data-html="title">Hero Counter <em>+</em> Synergy</h1><p data-t="introText"></p><div class="dataPill"><i></i><b id="heroCount">0</b>&nbsp;<span data-t="heroesLoaded">Heroes loaded</span></div></section>
<section class="guide card"><div class="guideTitle"><span data-t="howItWorksLabel"></span><h2 data-t="howItWorks"></h2><p data-t="howItWorksText"></p></div><div class="guideSteps"><div><b>1</b><strong data-t="step1Title"></strong><small data-t="step1Text"></small></div><div><b>2</b><strong data-t="step2Title"></strong><small data-t="step2Text"></small></div><div><b>3</b><strong data-t="step3Title"></strong><small data-t="step3Text"></small></div></div><div class="definition"><strong data-t="importantDifference"></strong><span data-t="differenceText"></span></div></section>
<section class="selector card"><label><span data-t="enemyHero">Enemy Hero</span><select id="hero"></select></label><label><span data-t="battleMode">Battle Mode</span><select id="mode"></select></label><button class="primary" id="analyze"><span data-t="analyze">Analyze Matchup</span> →</button></section>
<section id="loading" class="empty card" data-t="loading">Loading hero database…</section>
<section id="results" hidden>
<article class="resultMeaning card"><b data-t="resultSummary">Result summary</b><p id="summaryText"></p></article>
<div class="heroHead card"><img id="heroImg"><div class="heroMeta"><span id="gen"></span><h2 id="heroName"></h2><div class="badges"><b id="class"></b><b id="rarity"></b><b id="role"></b></div><p id="overview"></p></div><div class="confidence"><small data-t="dataConfidence">Data confidence</small><strong id="confidence"></strong><div><i id="confBar"></i></div><p data-t="confidenceHelp"></p></div></div>
<div class="scores"><article class="card"><small data-t="offense">Offense</small><b id="offense"></b><div><i id="offBar"></i></div></article><article class="card"><small data-t="defense">Defense</small><b id="defense"></b><div><i id="defBar"></i></div></article><article class="card"><small data-t="support">Support</small><b id="support"></b><div><i id="supBar"></i></div></article><article class="card"><small data-t="modeRating">Mode Rating</small><b id="modeScore"></b><div><i id="modeBar"></i></div></article></div>
<div class="grid"><article class="card panel"><header><div><span data-t="bestCounters"></span><h3 data-t="counterRanking"></h3></div><b id="modeName"></b></header><p class="panelHelp" data-t="counterHelp"></p><div id="counters"></div></article><article class="card panel"><header><div><span data-t="bestSynergy"></span><h3 data-t="partnerRanking"></h3></div></header><p class="panelHelp" data-t="synergyHelp"></p><div id="synergies"></div></article>
<article class="card panel teamPanel"><header><div><span data-t="recommendedTeam"></span><h3 data-t="topFormation"></h3></div></header><div class="formationRule" data-t="formationRule"></div><div id="team"></div><div id="teamReason" class="explain"></div></article><article class="card panel"><header><div><span data-t="analysis"></span><h3 data-t="strengthWeakness"></h3></div></header><h4 data-t="strengths"></h4><div id="strengths" class="tags"></div><h4 class="danger" data-t="weaknesses"></h4><div id="weaknesses" class="tags"></div></article></div>
<article class="card comparison"><header><div><span data-t="directComparison"></span><h3 data-t="compareHeroes"></h3><p data-t="comparisonHelp"></p></div><label><span data-t="compareAgainst"></span><select id="compareHero"></select></label></header><div id="comparisonBody"></div></article>
<article class="card evidence"><header><div><span data-t="dataInspector"></span><h3 data-t="skillsUsed"></h3><p data-t="skillsNote"></p></div><button id="toggleSkills" data-t="showDetails"></button></header><div id="skills" hidden></div></article>
</section></main><footer>SaifKS.com <i></i> <span data-t="footer"></span></footer><script src="app.js"></script></body></html>
